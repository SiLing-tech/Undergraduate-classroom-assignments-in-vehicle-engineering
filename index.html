<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拉电线 - 游戏首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fbf3dd;
            color: #171103;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background-color: #fbf3dd;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(118, 111, 92, 0.2);
        }

        .game-title {
            font-size: 4rem;
            font-weight: bold;
            color: #171103;
            margin-bottom: 60px;
            text-shadow: 3px 3px 0px #766f5c;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            letter-spacing: 5px;
        }

        .game-start {
            margin-top: 20px;
        }

        .start-btn {
            background-color: #766f5c;
            color: #fbf3dd;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            box-shadow: 0 4px 15px rgba(23, 17, 3, 0.3);
        }

        .start-btn:hover {
            background-color: #171103;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(23, 17, 3, 0.4);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 3rem;
            }
            
            .start-btn {
                font-size: 1.2rem;
                padding: 15px 30px;
            }
        }

        @media (max-width: 480px) {
            .game-title {
                font-size: 2.5rem;
            }
            
            .start-btn {
                font-size: 1rem;
                padding: 12px 24px;
            }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-board {
            width: 560px;
            height: 560px;
            background-color: #fbf3dd;
            border: 3px solid #766f5c;
            border-radius: 15px;
            margin: 30px 0;
            position: relative;
            box-shadow: 0 4px 15px rgba(23, 17, 3, 0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            width: 280px;
            height: 280px;
        }
        
        .grid-cell {
            width: 56px;
            height: 56px;
            border: 1px solid #766f5c;
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .grid-cell:hover {
            transform: scale(0.95);
        }
        
        .color-white {
            background-color: #ffffff;
        }
        
        .color-red {
            background-color: #ff6b6b;
        }
        
        .color-green {
            background-color: #4ecdc4;
        }
        
        .color-blue {
            background-color: #45b7d1;
        }

        .color-yellow {
            background-color: #ffd166;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .back-btn, .reset-btn, .level-btn {
            background-color: #766f5c;
            color: #fbf3dd;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        
        .back-btn:hover, .reset-btn:hover, .level-btn:hover {
            background-color: #171103;
            transform: scale(1.05);
        }
        
        .selected {
            box-shadow: 0 0 15px rgba(23, 17, 3, 0.5);
            transform: scale(0.9);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: #fbf3dd;
            border: 3px solid #766f5c;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(23, 17, 3, 0.3);
        }
        
        .modal-title {
            font-size: 2rem;
            font-weight: bold;
            color: #171103;
            margin-bottom: 30px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        
        .modal-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .modal-btn {
            background-color: #766f5c;
            color: #fbf3dd;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }
        
        .modal-btn:hover {
            background-color: #171103;
            transform: scale(1.05);
        }

        .level-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">金工课上连连看2.0</h1>
        
        <!-- 首页 -->
        <div id="homeScreen" class="game-start">
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>
        
        <!-- 游戏界面 -->
        <div id="gameScreen" style="display: none;">
            <h2 id="levelTitle" class="game-title" style="font-size: 2rem; margin-bottom: 20px;"></h2>
            <div class="level-selector">
                <button class="level-btn" onclick="loadLevel(1)">关卡 1</button>
                <button class="level-btn" onclick="loadLevel(2)">关卡 2</button>
                <button class="level-btn" onclick="loadLevel(3)">关卡 3</button>
            </div>
            <div class="game-container">
                <div class="game-board">
                    <div class="grid-container" id="gameBoard">
                        <!-- 游戏方格将通过JS生成 -->
                    </div>
                </div>
                <div class="controls">
                    <button class="reset-btn" onclick="resetGame()">重置游戏</button>
                    <button class="back-btn" onclick="goBack()">返回首页</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 通关提示模态框 -->
    <div id="successModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 class="modal-title">恭喜通关！</h2>
            <p id="successMessage" style="font-size: 1.2rem; color: #766f5c; margin-bottom: 30px;"></p>
            <div class="modal-buttons">
                <button class="modal-btn" id="nextLevelBtn" onclick="nextLevel()">下一关</button>
                <button class="modal-btn" onclick="resetGame()">重新尝试</button>
                <button class="modal-btn" onclick="goBack()">回到首页</button>
            </div>
        </div>
    </div>
    
    <script>
        // 游戏状态
        let currentLevel = 1;
        let currentGrid = [];
        let selectedColor = null;
        
        // 各关卡的初始网格状态
        const levels = [
            // 第一关
            [
                ['white', 'white', 'white', 'blue', 'white'],
                ['white', 'red', 'green', 'white', 'white'],
                ['white', 'white', 'white', 'white', 'white'],
                ['white', 'blue', 'green', 'red', 'white'],
                ['white', 'white', 'white', 'white', 'white']
            ],
            // 第二关
            [
                ['white', 'white', 'white', 'blue', 'white'],
                ['white', 'green', 'white', 'white', 'white'],
                ['red', 'white', 'white', 'red', 'white'],
                ['white', 'white', 'blue', 'white', 'white'],
                ['white', 'white', 'white', 'white', 'green']
            ],
            // 第三关
            [
                ['white', 'white', 'white', 'white', 'white'],
                ['blue', 'white', 'green', 'yellow', 'white'],
                ['green', 'white', 'white', 'white', 'white'],
                ['white', 'red', 'yellow', 'blue', 'white'],
                ['white', 'white', 'white', 'red', 'white']
            ]
        ];
        
        // 检查颜色是否已经完全连接
        function isColorConnected(color) {
            // 找到所有该颜色的格子
            const colorCells = [];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    if (currentGrid[row][col] === color) {
                        colorCells.push({row, col});
                    }
                }
            }
            
            if (colorCells.length <= 1) return true;
            
            // BFS检查连通性
            const visited = new Set();
            const queue = [colorCells[0]];
            visited.add(`${colorCells[0].row},${colorCells[0].col}`);
            
            while (queue.length > 0) {
                const {row, col} = queue.shift();
                
                // 检查四个方向
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                for (const [dr, dc] of directions) {
                    const newRow = row + dr;
                    const newCol = col + dc;
                    
                    if (newRow >= 0 && newRow < 5 && newCol >= 0 && newCol < 5) {
                        const key = `${newRow},${newCol}`;
                        if (!visited.has(key) && currentGrid[newRow][newCol] === color) {
                            visited.add(key);
                            queue.push({row: newRow, col: newCol});
                        }
                    }
                }
            }
            
            return visited.size === colorCells.length;
        }
        
        // 检查是否与同颜色方块邻近
        function isAdjacentToColor(row, col, color) {
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < 5 && newCol >= 0 && newCol < 5) {
                    if (currentGrid[newRow][newCol] === color) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        // 添加格子文字
        function addCellText(cell, row, col) {
            if (currentLevel === 1) {
                if (currentGrid[row][col] === 'blue') {
                    if (row === 0 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">特种铸造</div>';
                    } else if (row === 3 && col === 1) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Special Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'red') {
                    if (row === 1 && col === 1) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">熔模铸造</div>';
                    } else if (row === 3 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Investment Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'green') {
                    if (row === 1 && col === 2) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">金属型铸造</div>';
                    } else if (row === 3 && col === 2) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Gravity Die Casting</div>';
                    }
                }
            } else if (currentLevel === 2) {
                if (currentGrid[row][col] === 'blue') {
                    if (row === 0 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">压力铸造</div>';
                    } else if (row === 3 && col === 2) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Die Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'red') {
                    if (row === 2 && col === 0) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">离心铸造</div>';
                    } else if (row === 2 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Centrifugal Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'green') {
                    if (row === 1 && col === 1) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">低压铸造</div>';
                    } else if (row === 4 && col === 4) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Low-pressure Casting</div>';
                    }
                }
            } else if (currentLevel === 3) {
                if (currentGrid[row][col] === 'blue') {
                    if (row === 1 && col === 0) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">陶瓷性铸造</div>';
                    } else if (row === 3 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Ceramic Mold Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'red') {
                    if (row === 3 && col === 1) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">实型铸造</div>';
                    } else if (row === 4 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Full Mold Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'green') {
                    if (row === 1 && col === 2) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">消失模铸造</div>';
                    } else if (row === 2 && col === 0) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Lost Foam Casting</div>';
                    }
                } else if (currentGrid[row][col] === 'yellow') {
                    if (row === 1 && col === 3) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">壳型铸造</div>';
                    } else if (row === 3 && col === 2) {
                        cell.innerHTML = '<div style="font-size: 0.9rem; text-align: center; padding: 15px 5px;">Shell Mold Casting</div>';
                    }
                }
            }
        }
        
        // 初始化游戏
        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = `grid-cell color-${currentGrid[row][col]}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    // 点击事件 - 选择颜色
                    cell.addEventListener('click', function() {
                        const color = currentGrid[row][col];
                        if (color !== 'white' && !isColorConnected(color)) {
                            selectedColor = color;
                            // 移除其他单元格的选中状态
                            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('selected'));
                            // 添加当前单元格的选中状态
                            this.classList.add('selected');
                        }
                    });
                    
                    // 初始添加文字
                    addCellText(cell, row, col);
                    
                    // 鼠标悬停事件 - 染色
                    cell.addEventListener('mouseenter', function() {
                        if (selectedColor && currentGrid[row][col] === 'white' && isAdjacentToColor(row, col, selectedColor) && !isColorConnected(selectedColor)) {
                            // 染色
                            currentGrid[row][col] = selectedColor;
                            this.className = `grid-cell color-${selectedColor}`;
                            
                            // 检查该颜色是否已经完全连接
                            if (isColorConnected(selectedColor)) {
                                // 取消选中状态
                                selectedColor = null;
                                document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('selected'));
                            }
                            
                            // 检查是否通关
                            if (checkWin()) {
                                showSuccessModal();
                            }
                        }
                    });
                    
                    gameBoard.appendChild(cell);
                }
            }
        }
        
        // 检查游戏是否通关
        function checkWin() {
            // 检查所有颜色是否都已连接
            let colors = ['red', 'green', 'blue'];
            if (currentLevel === 3) {
                colors.push('yellow');
            }
            for (const color of colors) {
                if (!isColorConnected(color)) {
                    return false;
                }
            }
            
            return true;
        }
        
        // 显示通关提示
        function showSuccessModal() {
            const successModal = document.getElementById('successModal');
            const successMessage = document.getElementById('successMessage');
            const nextLevelBtn = document.getElementById('nextLevelBtn');
            
            if (currentLevel === 3) {
                successMessage.textContent = '您已完成所有关卡，太棒了！';
                nextLevelBtn.style.display = 'none';
            } else {
                successMessage.textContent = '';
                nextLevelBtn.style.display = 'inline-block';
            }
            
            successModal.style.display = 'flex';
        }
        
        // 重置游戏
        function resetGame() {
            currentGrid = JSON.parse(JSON.stringify(levels[currentLevel - 1]));
            selectedColor = null;
            document.getElementById('successModal').style.display = 'none';
            initGame();
        }
        
        // 下一关
        function nextLevel() {
            if (currentLevel < 3) {
                currentLevel++;
                loadLevel(currentLevel);
            }
            document.getElementById('successModal').style.display = 'none';
        }
        
        // 加载指定关卡
        function loadLevel(level) {
            currentLevel = level;
            currentGrid = JSON.parse(JSON.stringify(levels[level - 1]));
            selectedColor = null;
            document.getElementById('levelTitle').textContent = `连连看2.0 - 第${level}关`;
            initGame();
        }
        
        // 开始游戏
        function startGame() {
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            loadLevel(1);
        }
        
        // 返回首页
        function goBack() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'block';
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
</body>
</html>
